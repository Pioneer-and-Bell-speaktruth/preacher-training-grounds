<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Library</title>

    <link rel="stylesheet" href="../assets/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="bg-light">

    <div class="container py-4 wl-container">

        <h1 class="wl-header mb-4">Wisdom Library</h1>

        <div id="wl-list"></div>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ---------------------------------------------------
        // Wisdom Library books (same as React version)
        // ---------------------------------------------------
        const books = [
            { title: "Psalms for the Preacher", screen: "psalms.html" },
            { title: "Proverbs for the Preacher", screen: "proverbs.html" },
            { title: "Ecclesiastes Perspective", screen: "ecclesiastes.html" }
        ];

        const list = document.getElementById("wl-list");

        books.forEach(b => {
            const card = document.createElement("div");
            card.classList.add("wl-card");

            card.innerHTML = `
                <div class="wl-card-text">${b.title}</div>
            `;

            card.addEventListener("click", () => {
                window.location.href = b.screen;
            });

            list.appendChild(card);
        });
    </script>
</body>
</html>
