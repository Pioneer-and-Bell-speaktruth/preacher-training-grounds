<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Bible Study Plan</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch('../assets/global.html')
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

<div class="container py-4 daily-container">
    <!-- Plan Selection -->
    <div class="daily-section mb-4">
        <h2 class="daily-title">Choose Your Reading Plan</h2>

        <select id="plan-selector" class="form-select py-3">
           <option value="select" selected>Select a plan.</option>
           <option value="sectional">Sectional Plan</option>
           <option value="chronological">Chronological Plan</option>
        </select>

        <p class="daily-text mt-2">
            Your selection will automatically update this week's reading assignments.
        </p>
    </div>
    
    <!-- This single element will hold whichever layout is active -->
    <div id="secret-text" hidden></div>

        <!-- Interactive Progress Tracker Spreadsheet Container -->
    <div id="tracker-panel" class="daily-section mt-4" hidden>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="daily-title mb-0">Reading Tracker Spreadsheet</h2>
            <button id="reset-tracker-btn" class="btn btn-sm btn-outline-danger">Reset All Weeks</button>
        </div>
        
        <div class="table-responsive">
            <table class="table table-bordered table-striped align-middle text-center">
                <thead class="table-primary">
                    <tr>
                        <th style="width: 10%;">Status</th>
                        <th style="width: 15%;">Week No.</th>
                        <th style="width: 40%;">Old Testament Assignment</th>
                        <th style="width: 35%;">New Testament Assignment</th>
                    </tr>
                </thead>
                <tbody id="spreadsheet-rows">
                    <!-- Dynamically populated via script framework matrix -->
                </tbody>
            </table>
        </div>
    </div>

<!-- This Week's Reading -->
<div class="daily-section mt-4">
    <h2 class="daily-title">This Week's Reading (Week <span id="week-number"></span>)</h2>
    <p class="daily-text fs-4 fw-bold text-primary mb-0"><span id="weekly-assignment"></span></p>
</div>

<!-- Updated Operational Action Buttons -->
<div class="d-flex flex-column gap-3 mb-5">
    <button id="complete-btn" class="btn btn-success btn-lg py-3 w-100">
        <span class="fw-bold">Mark This Week Complete</span>
    </button>

    <button id="resume-btn" class="btn btn-secondary btn-lg py-3 w-100">
        <span>Refresh Spreadsheet View</span>
    </button>

    <button id="journal-btn" class="btn btn-info btn-lg py-3 w-100">
        <span>Add Weekly Study Notes</span>
    </button>
</div>

    <!-- Core Dependencies (Updated Paths) -->
    <script src="../assets/js/sectional-plan.js"></script>
    <script src="../assets/js/chronological-plan.js"></script>

    <script>
                // -----------------------------
        // Core Weekly App Variables
        // -----------------------------
        const selectedPlan = localStorage.getItem("selectedPlan") || "select";
        const currentWeek = parseInt(localStorage.getItem("currentReadingWeek")) || 1;
        
        // Element target nodes
        const targetContainer = document.getElementById("secret-text");
        const weeklyReadingSection = document.querySelector(".daily-section.mt-4");
        const trackerPanel = document.getElementById("tracker-panel");
        const spreadsheetRows = document.getElementById("spreadsheet-rows");

        // -----------------------------
        // Initialize Core View Layouts
        // -----------------------------
        if (selectedPlan === "select") {
            if (targetContainer) targetContainer.hidden = true;
            if (weeklyReadingSection) weeklyReadingSection.hidden = true;
            if (trackerPanel) trackerPanel.hidden = true;
            
            document.getElementById("weekly-assignment").textContent = "Select a plan first";
        } else {
            if (weeklyReadingSection) weeklyReadingSection.hidden = false;
            if (trackerPanel) trackerPanel.hidden = false;

            // Route dynamic file arrays cleanly 
            const readingPlan = selectedPlan === "chronological" 
                ? (window.chronologicalPlan || []) 
                : (window.sectionalPlan || []);

            // Render current highlighted header card row data
            const weekPlan = readingPlan[currentWeek - 1] || { ot: [], nt: [] };
            document.getElementById("week-number").textContent = currentWeek;

            // Extract values safely, filtering out empty fields or placeholders
            const otText = (weekPlan.ot && weekPlan.ot.length > 0 && weekPlan.ot[0] !== "N/A") ? weekPlan.ot.join(", ") : "";
            const ntText = (weekPlan.nt && weekPlan.nt.length > 0 && weekPlan.nt[0] !== "N/A") ? weekPlan.nt.join(", ") : "";

            // Dynamically combine text strings based on what data actually exists for this week
            let combinedAssignment = "";
            if (otText && ntText) {
                combinedAssignment = `${otText} & ${ntText}`;
            } else if (otText) {
                combinedAssignment = otText;
            } else if (ntText) {
                combinedAssignment = ntText;
            } else {
                combinedAssignment = "No assignments recorded for this week";
            }

            // Push the clean, tailored string directly to the single display node
            document.getElementById("weekly-assignment").textContent = combinedAssignment;

            // Inject the dynamic HTML summary descriptions
            if (targetContainer) {
                targetContainer.hidden = false; 
                targetContainer.innerHTML = selectedPlan === "chronological"
                    ? window.chronologicalPlanHTML
                    : window.sectionalPlanHTML;
            }

            // Render Spreadsheet Rows
            buildSpreadsheetTracker(readingPlan, selectedPlan);
        }

        // -----------------------------
        // Dynamic Spreadsheet Generator
        // -----------------------------
        function buildSpreadsheetTracker(planData, planType) {
            if (!spreadsheetRows) return;
            spreadsheetRows.innerHTML = ""; // Clear old rendering fragments

            // Isolate data spaces using unique storage keys per plan track
            const storageKey = planType === "chronological" ? "chronologicalProgress" : "sectionalProgress";
            const progressMatrix = JSON.parse(localStorage.getItem(storageKey)) || {};

            planData.forEach((weekData, index) => {
                const weekNum = index + 1;
                const isChecked = progressMatrix[weekNum] ? "checked" : "";
                
                // Highlight row background if this is the user's current targeted focus week
                const currentWeekHighlight = (weekNum === currentWeek) ? "table-warning text-dark fw-bold" : "";

                const rowHTML = `
                    <tr class="${currentWeekHighlight}">
                        <td>
                            <input type="checkbox" class="form-check-input tracker-checkbox" 
                                   data-week="${weekNum}" ${isChecked} style="transform: scale(1.3);">
                        </td>
                        <td>Week ${weekNum}</td>
                        <td class="text-start">${weekData.ot ? weekData.ot.join(", ") : "N/A"}</td>
                        <td class="text-start">${weekData.nt ? weekData.nt.join(", ") : "N/A"}</td>
                    </tr>
                `;
                spreadsheetRows.insertAdjacentHTML("beforeend", rowHTML);
            });

            // Bind Event Listeners to checkboxes for live reactive local updates
            document.querySelectorAll(".tracker-checkbox").forEach(box => {
                box.addEventListener("change", (e) => {
                    const targetedWeek = e.target.dataset.week;
                    const liveProgress = JSON.parse(localStorage.getItem(storageKey)) || {};
                    
                    // Assign explicit true/false values based on checkbox state
                    liveProgress[targetedWeek] = e.target.checked;
                    localStorage.setItem(storageKey, JSON.stringify(liveProgress));

                    // If user marks their current targeted week complete, optionally sync top headers
                    if (parseInt(targetedWeek) === currentWeek && e.target.checked) {
                        alert(`Week ${targetedWeek} successfully saved to tracking record!`);
                    }
                });
            });
        }

        // -----------------------------
        // Control Buttons Actions
        // -----------------------------
        document.getElementById("complete-btn").addEventListener("click", () => {
            if (selectedPlan === "select") return alert("Please select a reading plan first!");
            
            const storageKey = selectedPlan === "chronological" ? "chronologicalProgress" : "sectionalProgress";
            const liveProgress = JSON.parse(localStorage.getItem(storageKey)) || {};
            
            liveProgress[currentWeek] = true;
            localStorage.setItem(storageKey, JSON.stringify(liveProgress));

            // Auto-advance tracking context state to next logical calendar entry
            if (currentWeek < 52) {
                localStorage.setItem("currentReadingWeek", currentWeek + 1);
            }
            window.location.reload();
        });

        document.getElementById("reset-tracker-btn").addEventListener("click", () => {
            if (confirm("Are you sure you want to clear your entire checked spreadsheet for this plan?")) {
                const storageKey = selectedPlan === "chronological" ? "chronologicalProgress" : "sectionalProgress";
                localStorage.removeItem(storageKey);
                localStorage.setItem("currentReadingWeek", 1);
                window.location.reload();
            }
        });

        document.getElementById("resume-btn").addEventListener("click", () => {
            window.location.reload();
        });

        document.getElementById("journal-btn").addEventListener("click", () => {
            const exactTimestamp = new Date().toLocaleDateString();
            sessionStorage.setItem("journalDay", `Week ${currentWeek} - ${exactTimestamp}`);
            window.location.href = "journal.html";
        });

        // Dropdown selection hook configuration
        const planSelector = document.getElementById("plan-selector");
        if (planSelector) {
            planSelector.value = selectedPlan;
            planSelector.addEventListener("change", (e) => {
                localStorage.setItem("selectedPlan", e.target.value);
                // Reset focus tracking weeks cleanly when migrating across tracks
                localStorage.setItem("currentReadingWeek", 1);
                window.location.reload();
            });
        }
    </script>
</body>
</html>
