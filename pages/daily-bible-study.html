<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Bible Study Plan</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch('../assets/global.html')
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

<div class="container py-4 daily-container">
    <!-- Plan Selection -->
    <div class="daily-section mb-4">
        <h2 class="daily-title">Choose Your Reading Plan</h2>

        <select id="plan-selector" class="form-select py-3">
           <option value="select" selected>Select a plan.</option>
           <option value="sectional">Sectional Plan</option>
           <option value="chronological">Chronological Plan</option>
        </select>

        <p class="daily-text mt-2">
            Your selection will automatically update this week's reading assignments.
        </p>
    </div>
    
    <!-- This single element will hold whichever layout is active -->
    <div id="secret-text" hidden></div>

    <!-- This Week's Reading -->
    <div class="daily-section mt-4">
        <h2 class="daily-title">This Week's Reading (Week <span id="week-number"></span>)</h2>
        <p class="daily-text">Old Testament Assignment: <span id="ot-reading"></span></p>
        <p class="daily-text">New Testament Assignment: <span id="nt-reading"></span></p>
    </div>

    <!-- Operational Buttons -->
    <button id="complete-btn" class="btn w-100 py-3 daily-complete-btn mb-3">
        <span class="daily-complete-text">Mark Week Complete</span>
    </button>

    <button id="resume-btn" class="btn w-100 py-3 daily-resume-btn mb-3">
        <span class="daily-resume-text">Resume Reading</span>
    </button>

    <button id="journal-btn" class="btn w-100 py-3 daily-journal-btn mb-5">
        <span class="daily-journal-text">Add Daily Notes</span>
    </button>
</div>

    <!-- Core Dependencies (Updated Paths) -->
    <script src="../assets/js/sectional-plan.js"></script>
    <script src="../assets/js/chronological-plan.js"></script>

    <script>
        // -----------------------------
        // Fail-safes for loading lags
        // -----------------------------
        window.sectionalPlan = window.sectionalPlan || [{ot: ["Genesis 1"], nt: ["Matthew 1"]}];
        window.chronologicalPlan = window.chronologicalPlan || [{ot: ["Genesis 1"], nt: ["Matthew 1"]}];
        window.sectionalPlanHTML = window.sectionalPlanHTML || "<p>Sectional plan layout content loading...</p>";
        window.chronologicalPlanHTML = window.chronologicalPlanHTML || "<p>Chronological plan layout content loading...</p>";

                // -----------------------------
        // Load Weekly Reading Plan Data
        // -----------------------------
        const selectedPlan = localStorage.getItem("selectedPlan") || "select";
        
        // Track by currentReadingWeek instead of currentReadingDay (1 to 52)
        const currentWeek = parseInt(localStorage.getItem("currentReadingWeek")) || 1;
        document.getElementById("week-number").textContent = currentWeek;

        const targetContainer = document.getElementById("secret-text");
        const weeklyReadingSection = document.querySelector(".daily-section.mt-4");

        // -----------------------------
        // Check Selection State
        // -----------------------------
        if (selectedPlan === "select") {
            if (targetContainer) targetContainer.hidden = true;
            if (weeklyReadingSection) weeklyReadingSection.hidden = true;
            
            document.getElementById("ot-reading").textContent = "Select a plan first";
            document.getElementById("nt-reading").textContent = "Select a plan first";
        } else {
            if (weeklyReadingSection) weeklyReadingSection.hidden = false;

            const readingPlan =
                selectedPlan === "chronological"
                    ? window.chronologicalPlan
                    : window.sectionalPlan;

            // Grabs the current week offset object index (0 to 51)
            const weekPlan = readingPlan[currentWeek - 1] || { ot: ["N/A"], nt: ["N/A"] };

            document.getElementById("ot-reading").textContent = weekPlan.ot ? weekPlan.ot.join(", ") : "N/A";
            document.getElementById("nt-reading").textContent = weekPlan.nt ? weekPlan.nt.join(", ") : "N/A";

            if (targetContainer) {
                targetContainer.hidden = false; 
                targetContainer.innerHTML = 
                    selectedPlan === "chronological"
                        ? window.chronologicalPlanHTML
                        : window.sectionalPlanHTML;
            }
        }

        // -----------------------------
        // Action Buttons
        // -----------------------------
        document.getElementById("complete-btn").addEventListener("click", () => {
            if (selectedPlan === "select") {
                alert("Please select a reading plan first!");
                return;
            }
            // Track progress by week IDs
            const progress = JSON.parse(localStorage.getItem("weeklyReadingProgress")) || {};
            progress[currentWeek] = true;
            localStorage.setItem("weeklyReadingProgress", JSON.stringify(progress));
            alert(`Week ${currentWeek} marked complete.`);
        });

        document.getElementById("resume-btn").addEventListener("click", () => {
            window.location.href = "daily-bible-study.html";
        });

        document.getElementById("journal-btn").addEventListener("click", () => {
            // Keep journal instances explicitly dynamic (can track multiple notes per week)
            const exactTimestamp = new Date().toLocaleDateString();
            sessionStorage.setItem("journalDay", `Week ${currentWeek} - ${exactTimestamp}`);
            window.location.href = "journal.html";
        });

        // -----------------------------
        // Plan Selector Change Event
        // -----------------------------
        const planSelector = document.getElementById("plan-selector");
        if (planSelector) {
            planSelector.value = selectedPlan;
            planSelector.addEventListener("change", (e) => {
                localStorage.setItem("selectedPlan", e.target.value);
                window.location.reload();
            });
        }
    </script>
</body>
</html>
