<body class="bg-light">

    <div class="container py-4 sd-container">

        <h1 id="sermon-title" class="sd-title mb-4"></h1>

        <div id="sermon-fields"></div>

        <!-- EDIT -->
        <button id="edit-btn" class="btn w-100 py-3 sd-button mb-3">
            <span class="sd-button-text">Edit Sermon</span>
        </button>

        <!-- DELETE -->
        <button id="delete-btn" class="btn w-100 py-3 sd-button sd-danger mb-3">
            <span class="sd-button-text">Delete Sermon</span>
        </button>

        <!-- EXPORT -->
        <button id="export-text-btn" class="btn w-100 py-3 sd-button mb-3">
            <span class="sd-button-text">Export as Text</span>
        </button>

        <button id="export-md-btn" class="btn w-100 py-3 sd-button mb-3">
            <span class="sd-button-text">Export as Markdown</span>
        </button>

        <button id="export-pdf-btn" class="btn w-100 py-3 sd-button mb-3">
            <span class="sd-button-text">Export as PDF</span>
        </button>

        <button id="copy-btn" class="btn w-100 py-3 sd-button-secondary mb-3">
            <span class="sd-button-text">Copy to Clipboard</span>
        </button>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ---------------------------------------------------
        // Load sermon from sessionStorage
        // ---------------------------------------------------
        const sermon = JSON.parse(sessionStorage.getItem("currentSermon"));
        const index = Number(sessionStorage.getItem("currentSermonIndex"));

        const allSermons = JSON.parse(localStorage.getItem("allSermons")) || [];

        // ---------------------------------------------------
        // Build export formats (converted from exportSermon.js)
        // ---------------------------------------------------
        function buildSermonText(s) {
            return `
Title: ${s.title}
Scripture Reading: ${s.scripturereading}
Big Idea: ${s.bigIdea}

Introduction:
${s.intro}

Point 1:
${s.point1}

Point 2:
${s.point2}

Point 3:
${s.point3}

Conclusion:
${s.conclusion}

Tags:
${(s.tags || []).join(", ")}
`.trim();
        }

        function buildSermonMarkdown(s) {
            return `
# ${s.title}

## Scripture Reading
${s.scripturereading}

## Big Idea
${s.bigIdea}

## Introduction
${s.intro}

## Point 1
${s.point1}

## Point 2
${s.point2}

## Point 3
${s.point3}

## Conclusion
${s.conclusion}

## Tags
${(s.tags || []).join(", ")}
`.trim();
        }

        // ---------------------------------------------------
        // Populate UI
        // ---------------------------------------------------
        document.getElementById("sermon-title").textContent = sermon.title;

        const fields = [
            ["Scripture Reading", sermon.scripturereading],
            ["Big Idea", sermon.bigIdea],
            ["Introduction", sermon.intro],
            ["Point 1", sermon.point1],
            ["Point 2", sermon.point2],
            ["Point 3", sermon.point3],
            ["Conclusion", sermon.conclusion],
            ["Tags", (sermon.tags || []).join(", ")]
        ];

        const container = document.getElementById("sermon-fields");

        fields.forEach(([label, value]) => {
            const section = document.createElement("div");
            section.innerHTML = `
                <h2 class="sd-label">${label}</h2>
                <p class="sd-text">${value.replace(/\n/g, "<br>")}</p>
            `;
            container.appendChild(section);
        });

        // ---------------------------------------------------
        // Edit Sermon
        // ---------------------------------------------------
        document.getElementById("edit-btn").addEventListener("click", () => {
            window.location.href = "edit-sermon.html";
        });

        // ---------------------------------------------------
        // Delete Sermon
        // ---------------------------------------------------
        document.getElementById("delete-btn").addEventListener("click", () => {
            if (confirm("Are you sure you want to delete this sermon?")) {
                allSermons.splice(index, 1);
                localStorage.setItem("allSermons", JSON.stringify(allSermons));
                window.location.href = "my-sermons.html";
            }
        });

        // ---------------------------------------------------
        // Export as Text
        // ---------------------------------------------------
        document.getElementById("export-text-btn").addEventListener("click", () => {
            const content = buildSermonText(sermon);
            const blob = new Blob([content], { type: "text/plain" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = `${sermon.title || "sermon"}.txt`;
            a.click();

            URL.revokeObjectURL(url);
        });

        // ---------------------------------------------------
        // Export as Markdown
        // ---------------------------------------------------
        document.getElementById("export-md-btn").addEventListener("click", () => {
            const content = buildSermonMarkdown(sermon);
            const blob = new Blob([content], { type: "text/markdown" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = `${sermon.title || "sermon"}.md`;
            a.click();

            URL.revokeObjectURL(url);
        });

        // ---------------------------------------------------
        // Copy to Clipboard
        // ---------------------------------------------------
        document.getElementById("copy-btn").addEventListener("click", async () => {
            const content = buildSermonMarkdown(sermon);
            await navigator.clipboard.writeText(content);
            alert("Copied to clipboard!");
        });

        // ---------------------------------------------------
        // Export as PDF
        // ---------------------------------------------------
        document.getElementById("export-pdf-btn").addEventListener("click", () => {
            const { jsPDF } = window.jspdf;

            const doc = new jsPDF({ unit: "pt", format: "letter" });

            const margin = 40;
            const lineHeight = 16;
            let y = margin;

            const content = buildSermonMarkdown(sermon);
            const lines = doc.splitTextToSize(content, 550);

            lines.forEach(line => {
                if (y > 750) { doc.addPage(); y = margin; }
                doc.text(line, margin, y);
                y += lineHeight;
            });

            doc.save(`${sermon.title || "sermon"}.pdf`);
        });
    </script>
</body>
</html>
