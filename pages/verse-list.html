<body class="bg-light">

    <div class="container py-4 vl-container">

        <!-- Vertical grid alignment wrapper stack for left-aligned buttons -->
        <div id="vl-list" class="d-grid gap-3" style="max-width: 650px;"></div>

    </div>

    <script>
        // ---------------------------------------------------
        // Load file + title from sessionStorage
        // ---------------------------------------------------
        const file = sessionStorage.getItem("verseListFile");
        const title = sessionStorage.getItem("verseListTitle");

        const list = document.getElementById("vl-list");

        // ---------------------------------------------------
        // Handle special cases: random & favorites
        // ---------------------------------------------------
        if (file === "random") {
            sessionStorage.setItem("randomVerse", "true");
            window.location.href = "verse-detail.html";
        }

        if (file === "favorites") {
            window.location.href = "favorites.html";
        }

        // ---------------------------------------------------
        // Load verses from JSON file
        // ---------------------------------------------------
        async function loadVerses() {
            try {
                const response = await fetch(`../data/${file}.json`);
                if (!response.ok) throw new Error("Data file could not be found");
                
                const verses = await response.json();

                verses.forEach((v, index) => {
                    // Create a formal HTML button element instead of a structural div card block
                    const button = document.createElement("button");
                    
                    // Bootstrap styles to make it a left-aligned, spacious line item button panel row
                    button.className = "btn btn-outline-primary btn-lg w-100 text-start py-3 px-4 shadow-sm";

                    // Balanced side-by-side flex layout to stack text fields neatly
                    button.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center w-100 flex-wrap gap-2">
                            <span class="vl-ref fw-bold text-primary">${v.ref}</span>
                            <span class="vl-theme text-muted small fs-6">${v.theme}</span>
                        </div>
                    `;

                    // Handle verse view routing click events
                    button.addEventListener("click", () => {
                        sessionStorage.setItem("currentVerse", JSON.stringify(v));
                        sessionStorage.removeItem("randomVerse");
                        window.location.href = "verse-detail.html";
                    });

                    list.appendChild(button);
                });
            } catch (err) {
                console.error("Verse loading failed:", err);
            }
        }

        loadVerses();
    </script>
</body>
