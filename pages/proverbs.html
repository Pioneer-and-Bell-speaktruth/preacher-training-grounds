<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proverbs for the Preacher</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch("assets/global.html")
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 prov-container">

        <h1 class="prov-header mb-4">Proverbs for the Preacher</h1>

        <div id="proverbs-list"></div>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ---------------------------------------------------
        // Load proverbs.json (static fetch)
        // ---------------------------------------------------
        async function loadProverbs() {
            const response = await fetch("../data/proverbs.json");
            const verses = await response.json();

            const list = document.getElementById("proverbs-list");

            verses.forEach((v, index) => {
                const card = document.createElement("div");
                card.classList.add("prov-card");

                card.innerHTML = `
                    <div class="prov-ref">${v.ref}</div>
                    <div class="prov-theme">${v.theme}</div>
                `;

                card.addEventListener("click", () => {
                    sessionStorage.setItem("currentVerse", JSON.stringify(v));
                    window.location.href = "verse-detail.html";
                });

                list.appendChild(card);
            });
        }

        loadProverbs();
    </script>
</body>
</html>
