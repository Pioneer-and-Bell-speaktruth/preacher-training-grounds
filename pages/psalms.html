<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psalms for the Preacher</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch('../assets/global.html')
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 psalms-container">

        <h1 class="psalms-header mb-4">Psalms for the Preacher</h1>

        <div id="psalms-list"></div>

    </div>

<div class="container py-4">

    <div id="psalms-list" class="d-grid gap-3" style="max-width: 500px;"></div>

</html>
