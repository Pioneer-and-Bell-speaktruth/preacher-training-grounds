<body class="bg-light">

    <div class="container py-4 edit-lesson-container">

        <h1 class="edit-lesson-header mb-4">Edit Lesson</h1>

        <input
            id="lesson-title"
            class="form-control edit-lesson-input mb-3"
            placeholder="Lesson Title"
        />

        <input
            id="lesson-text"
            class="form-control edit-lesson-input mb-3"
            placeholder="Primary Text"
        />

        <textarea
            id="lesson-summary"
            class="form-control edit-lesson-input mb-3"
            style="height: 120px;"
            placeholder="Summary"
        ></textarea>

        <button id="save-btn" class="btn w-100 py-3 edit-lesson-save-btn mb-3">
            <span class="edit-lesson-button-text">Save Changes</span>
        </button>

        <button id="pdf-btn" class="btn w-100 py-3 edit-lesson-pdf-btn">
            <span class="edit-lesson-button-text">Export as PDF</span>
        </button>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/app.js"></script>

    <script>
        // -----------------------------
        // Load navigation state
        // -----------------------------
        const lesson = JSON.parse(sessionStorage.getItem("currentLesson"));
        const lessonIndex = JSON.parse(sessionStorage.getItem("currentLessonIndex"));
        const series = JSON.parse(sessionStorage.getItem("currentSeries"));
        const seriesIndex = JSON.parse(sessionStorage.getItem("currentSeriesIndex"));

        // -----------------------------
        // Populate form
        // -----------------------------
        document.getElementById("lesson-title").value = lesson.title;
        document.getElementById("lesson-text").value = lesson.text;
        document.getElementById("lesson-summary").value = lesson.summary;

        // -----------------------------
        // Save Changes
        // -----------------------------
        document.getElementById("save-btn").addEventListener("click", () => {
            const updatedLesson = {
                title: document.getElementById("lesson-title").value.trim(),
                text: document.getElementById("lesson-text").value.trim(),
                summary: document.getElementById("lesson-summary").value.trim()
            };

            // Update lesson inside series
            const allSeries = JSON.parse(localStorage.getItem("allSeries")) || [];
            const updatedSeries = { ...series };
            updatedSeries.lessons[lessonIndex] = updatedLesson;

            allSeries[seriesIndex] = updatedSeries;
            localStorage.setItem("allSeries", JSON.stringify(allSeries));

            // Store updated series for next page
            sessionStorage.setItem("currentSeries", JSON.stringify(updatedSeries));

            window.location.href = "series-detail.html";
        });

        // -----------------------------
        // Export PDF
        // -----------------------------
        document.getElementById("pdf-btn").addEventListener("click", () => {
            const { jsPDF } = window.jspdf;

            const doc = new jsPDF({
                unit: "pt",
                format: "letter"
            });

            const margin = 40;
            const lineHeight = 16;
            let y = margin;

            const title = document.getElementById("lesson-title").value.trim();
            const text = document.getElementById("lesson-text").value.trim();

            doc.setFontSize(20);
            doc.text(title || "Lesson", margin, y);
            y += 30;

            doc.setFontSize(12);
            const lines = doc.splitTextToSize(text || "", 550);

            lines.forEach(line => {
                if (y > 750) {
                    doc.addPage();
                    y = margin;
                }
                doc.text(line, margin, y);
                y += lineHeight;
            });

            doc.save(`${title || "lesson"}.pdf`);
        });
    </script>
