<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal & Prayer</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch("assets/global.html")
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 journal-container">

        <h1 class="journal-header mb-4">Journal & Prayer</h1>

        <!-- Journal Entry -->
        <h2 class="journal-section-title">New Journal Entry</h2>
        <textarea
            id="journal-entry"
            class="form-control journal-input mb-3"
            placeholder="Write your thoughts, reflections, or insights..."
        ></textarea>

        <button id="save-entry-btn" class="btn w-100 py-3 journal-button mb-4">
            <span class="journal-button-text">Save Entry</span>
        </button>

        <!-- Prayer Request -->
        <h2 class="journal-section-title">New Prayer Request</h2>
        <textarea
            id="prayer-entry"
            class="form-control journal-input mb-3"
            placeholder="Write a prayer request..."
        ></textarea>

        <button id="save-prayer-btn" class="btn w-100 py-3 journal-button mb-4">
            <span class="journal-button-text">Save Prayer</span>
        </button>

        <!-- Past Journal Entries -->
        <h2 class="journal-section-title">Past Journal Entries</h2>
        <div id="journal-list"></div>

        <!-- Past Prayer Requests -->
        <h2 class="journal-section-title">Prayer Requests</h2>
        <div id="prayer-list"></div>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ---------------------------------------------------
        // Load navigation state (from DailyBibleStudy)
        // ---------------------------------------------------
        const day = JSON.parse(sessionStorage.getItem("journalDay"));

        // ---------------------------------------------------
        // Load LocalStorage data
        // ---------------------------------------------------
        const entries = JSON.parse(localStorage.getItem("journalEntries")) || [];
        const prayers = JSON.parse(localStorage.getItem("prayerRequests")) || [];

        const journalEntry = document.getElementById("journal-entry");
        const prayerEntry = document.getElementById("prayer-entry");

        // Pre-fill notes if coming from DailyBibleStudy
        if (day) {
            journalEntry.value = `Notes for Day ${day}:\n\n`;
        }

        // ---------------------------------------------------
        // Save Journal Entry
        // ---------------------------------------------------
        document.getElementById("save-entry-btn").addEventListener("click", () => {
            const text = journalEntry.value.trim();
            if (!text) return;

            const updated = [
                ...entries,
                { text, date: new Date().toISOString() }
            ];

            localStorage.setItem("journalEntries", JSON.stringify(updated));
            journalEntry.value = "";
            window.location.reload();
        });

        // ---------------------------------------------------
        // Save Prayer Request
        // ---------------------------------------------------
        document.getElementById("save-prayer-btn").addEventListener("click", () => {
            const text = prayerEntry.value.trim();
            if (!text) return;

            const updated = [
                ...prayers,
                { text, date: new Date().toISOString() }
            ];

            localStorage.setItem("prayerRequests", JSON.stringify(updated));
            prayerEntry.value = "";
            window.location.reload();
        });

        // ---------------------------------------------------
        // Render Past Journal Entries
        // ---------------------------------------------------
        const journalList = document.getElementById("journal-list");

        entries.forEach(e => {
            const card = document.createElement("div");
            card.classList.add("journal-card");
            card.innerHTML = `
                <div class="journal-date">${new Date(e.date).toLocaleDateString()}</div>
                <div class="journal-text">${e.text.replace(/\n/g, "<br>")}</div>
            `;
            journalList.appendChild(card);
        });

        // ---------------------------------------------------
        // Render Past Prayer Requests
        // ---------------------------------------------------
        const prayerList = document.getElementById("prayer-list");

        prayers.forEach(p => {
            const card = document.createElement("div");
            card.classList.add("journal-card");
            card.innerHTML = `
                <div class="journal-date">${new Date(p.date).toLocaleDateString()}</div>
                <div class="journal-text">${p.text.replace(/\n/g, "<br>")}</div>
            `;
            prayerList.appendChild(card);
        });
    </script>
</body>
</html>
