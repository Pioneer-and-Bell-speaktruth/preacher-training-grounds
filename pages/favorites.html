<body class="bg-light">

    <div class="container py-4 fav-container">

        <h1 class="fav-header mb-4">Your Favorite Verses</h1>

        <div id="fav-empty" class="fav-empty-container">
            <h2 class="fav-empty-text">No favorites yet.</h2>
            <p class="fav-empty-sub">Add verses from the encouragement section.</p>
        </div>

        <div id="fav-list"></div>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // -----------------------------
        // Load favorites
        // -----------------------------
        const favorites = JSON.parse(localStorage.getItem("favorites")) || [];

        const list = document.getElementById("fav-list");
        const empty = document.getElementById("fav-empty");

        if (favorites.length === 0) {
            empty.style.display = "block";
        } else {
            empty.style.display = "none";

            favorites.forEach((v, index) => {
                const card = document.createElement("div");
                card.classList.add("fav-card");

                card.innerHTML = `
                    <div class="fav-click-area">
                        <div class="fav-ref">${v.ref}</div>
                        <div class="fav-theme">${v.theme}</div>
                    </div>

                    <button class="fav-remove-btn">
                        <span class="fav-remove-text">Remove</span>
                    </button>
                `;

                // Navigate to verse detail
                card.querySelector(".fav-click-area").addEventListener("click", () => {
                    sessionStorage.setItem("currentVerse", JSON.stringify(v));
                    window.location.href = "verse-detail.html";
                });

                // Remove favorite
                card.querySelector(".fav-remove-btn").addEventListener("click", () => {
                    const updated = [...favorites];
                    updated.splice(index, 1);
                    localStorage.setItem("favorites", JSON.stringify(updated));
                    window.location.reload();
                });

                list.appendChild(card);
            });
        }
    </script>
