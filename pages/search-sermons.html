<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Sermons</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch('../assets/global.html')
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 ss-container">

        <h1 class="ss-header mb-4">Search Sermons</h1>

        <input
            id="search-input"
            class="form-control ss-input mb-4"
            placeholder="Search by title, scripture, idea..."
        />

        <div id="sermon-list"></div>

        <p id="no-results" class="ss-empty">No sermons match your search.</p>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ---------------------------------------------------
        // Load sermons from LocalStorage
        // ---------------------------------------------------
        const allSermons = JSON.parse(localStorage.getItem("allSermons")) || [];

        const list = document.getElementById("sermon-list");
        const searchInput = document.getElementById("search-input");
        const emptyMsg = document.getElementById("no-results");

        emptyMsg.style.display = "none";

        function renderSermons(filtered) {
            list.innerHTML = "";

            if (filtered.length === 0) {
                emptyMsg.style.display = "block";
                return;
            }

            emptyMsg.style.display = "none";

            filtered.forEach((s, index) => {
                const card = document.createElement("div");
                card.classList.add("ss-card");

                card.innerHTML = `
                    <div class="ss-title">${s.title || "Untitled Sermon"}</div>
                    <div class="ss-text">${s.scripturereading || ""}</div>
                `;

                card.addEventListener("click", () => {
                    sessionStorage.setItem("currentSermon", JSON.stringify(s));
                    sessionStorage.setItem("currentSermonIndex", index);
                    window.location.href = "sermon-detail.html";
                });

                list.appendChild(card);
            });
        }

        // Initial render
        renderSermons(allSermons);

        // ---------------------------------------------------
        // Search filtering
        // ---------------------------------------------------
        searchInput.addEventListener("input", () => {
            const q = searchInput.value.toLowerCase();

            const filtered = allSermons.filter(s =>
                (s.title || "").toLowerCase().includes(q) ||
                (s.scripturereading || "").toLowerCase().includes(q) ||
                (s.bigIdea || "").toLowerCase().includes(q) ||
                (s.intro || "").toLowerCase().includes(q) ||
                (s.point1 || "").toLowerCase().includes(q) ||
                (s.point2 || "").toLowerCase().includes(q) ||
                (s.point3 || "").toLowerCase().includes(q) ||
                (s.conclusion || "").toLowerCase().includes(q) ||
                (s.tags || []).some(tag => tag.toLowerCase().includes(q))
            );

            renderSermons(filtered);
        });
</body>
</html>
