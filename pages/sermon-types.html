<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sermon Types & Training</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch('../assets/global.html')
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 st-container">

        <h1 class="st-header mb-4">Sermon Types & Training</h1>

        <!-- Vertical grid alignment wrapper stack for left-aligned buttons -->
        <div id="types-list" class="d-grid gap-3" style="max-width: 500px;"></div>

    </div>

    <script>
        // ---------------------------------------------------
        // Sermon types (Updated to Left-Aligned Buttons)
        // ---------------------------------------------------
        const types = [
            { title: "Expository Sermon", screen: "expository.html" },
            { title: "Textual Sermon", screen: "textual.html" },
            { title: "Topical Sermon", screen: "topical.html" },
            { title: "Narrative Sermon", screen: "narrative.html" }
        ];

        const list = document.getElementById("types-list");

        types.forEach(t => {
            // Create a formal HTML button element instead of a structural div card block
            const button = document.createElement("button");
            
            // Bootstrap styles to make it a left-aligned, full-width button line structure
            button.className = "btn btn-outline-primary btn-lg w-100 text-start py-3 px-4 shadow-sm";

            button.innerHTML = `
                <span class="st-card-text fw-bold">${t.title}</span>
            `;

            // Active redirect route trigger listener hook
            button.addEventListener("click", () => {
                window.location.href = t.screen;
            });

            list.appendChild(button);
        });
    </script>
</body>
</html>
