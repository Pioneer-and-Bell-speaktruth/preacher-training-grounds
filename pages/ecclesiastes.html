<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecclesiastes Perspective</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch("assets/global.html")
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 ecc-container">

        <h1 class="ecc-header mb-4">Ecclesiastes Perspective</h1>

        <div id="ecc-list"></div>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/app.js"></script>

    <script>
        // Load Ecclesiastes JSON
        fetch("../data/ecclesiastes.json")
            .then(res => res.json())
            .then(verses => {
                const list = document.getElementById("ecc-list");

                verses.forEach((v, index) => {
                    const card = document.createElement("div");
                    card.classList.add("ecc-card");
                    card.innerHTML = `
                        <div class="ecc-ref">${v.ref}</div>
                        <div class="ecc-theme">${v.theme}</div>
                    `;

                    card.addEventListener("click", () => {
                        sessionStorage.setItem("currentVerse", JSON.stringify(v));
                        window.location.href = "verse-detail.html";
                    });

                    list.appendChild(card);
                });
            });
    </script>
</body>
</html>
