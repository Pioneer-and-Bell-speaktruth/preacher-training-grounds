<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecclesiastes Perspective</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch('../assets/global.html')
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 ecc-container">

        <h1 class="ecc-header mb-4">Ecclesiastes Perspective</h1>

        <!-- Single, clean vertical grid layout wrapper for left-aligned buttons -->
        <div id="ecclesiastes-list" class="d-grid gap-3" style="max-width: 650px;"></div>

    </div>

    <script>
        const list = document.getElementById("ecclesiastes-list");

        // Dynamically loads the corresponding data array from your server data folder
        async function loadEcclesiastes() {
            try {
                // Fetches the data structure registry file
                const response = await fetch('../data/ecclesiastes.json');
                if (!response.ok) throw new Error("Ecclesiastes data file not found");
                
                const ecclesiastesArray = await response.json();

                ecclesiastesArray.forEach(ecc => {
                    const button = document.createElement("button");
                    button.className = "btn btn-outline-primary btn-lg w-100 text-start py-3 px-4 shadow-sm";
                    
                    // Support both object strings (ecc.ref) or flat string listings (ecc)
                    const displayLabel = ecc.ref || ecc.title || ecc;
                    const displaySubtitle = ecc.theme || "";

                    button.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center w-100 flex-wrap gap-2">
                            <span class="fw-bold text-primary">${displayLabel}</span>
                            ${displaySubtitle ? `<span class="text-muted small fs-6">${displaySubtitle}</span>` : ''}
                        </div>
                    `;
                    
                    button.addEventListener("click", () => {
                        // Store selection securely before forwarding to your detail viewing card
                        sessionStorage.setItem("currentVerse", JSON.stringify(ecc));
                        sessionStorage.removeItem("randomVerse");
                        window.location.href = "verse-detail.html";
                    });
                    
                    list.appendChild(button);
                });
            } catch (err) {
                console.warn("Falling back to local array loading state:", err);
                // Fail-safe: if you hardcoded data variables inside your script previously, run that map here instead
                if (typeof ecclesiastesArray !== 'undefined') {
                    renderLocalArray(ecclesiastesArray);
                }
            }
        }

        function renderLocalArray(arr) {
            list.innerHTML = "";
            arr.forEach(ecc => {
                const button = document.createElement("button");
                button.className = "btn btn-outline-primary btn-lg w-100 text-start py-3 px-4 shadow-sm";
                button.innerHTML = `<span class="fw-bold">${ecc.title || ecc}</span>`;
                button.addEventListener("click", () => {
                    window.location.href = "verse-detail.html";
                });
                list.appendChild(button);
            });
        }

        // Initialize loading procedure
        loadEcclesiastes();
    </script>
</body>
</html>
