<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Progress</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch('../assets/global.html')
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 progress-container">

        <h1 class="progress-header mb-4">Reading Progress</h1>

        <!-- Overall Progress -->
        <div class="progress-section mb-4">
            <h2 class="progress-title">Overall Progress</h2>

            <div class="progress-bar-outer">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>

            <p id="progress-days" class="progress-text"></p>
            <p id="progress-percent" class="progress-text"></p>
        </div>

        <!-- Current Day -->
        <div class="progress-section">
            <h2 class="progress-title">Current Day</h2>
            <p id="current-day" class="progress-text"></p>
        </div>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ---------------------------------------------------
        // Load reading progress from LocalStorage
        // ---------------------------------------------------
        const completedDays = JSON.parse(localStorage.getItem("completedDays")) || [];
        const currentDay = JSON.parse(localStorage.getItem("currentReadingDay")) || 1;

        const completed = completedDays.length;
        const percentage = (completed / 365) * 100;

        // ---------------------------------------------------
        // Update UI
        // ---------------------------------------------------
        document.getElementById("progress-fill").style.width = percentage + "%";

        document.getElementById("progress-days").textContent =
            `${completed} / 365 days completed`;

        document.getElementById("progress-percent").textContent =
            `${percentage.toFixed(1)}% complete`;

        document.getElementById("current-day").textContent =
            `You are on Day ${currentDay}`;
    </script>
</body>
</html>
