<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Library</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch('../assets/global.html')
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 wl-container">

        <h1 class="wl-header mb-4">Wisdom Library</h1>

        <!-- Vertical grid alignment wrapper stack for left-aligned buttons -->
        <div id="wl-list" class="d-grid gap-3" style="max-width: 500px;"></div>

    </div>

    <!-- Removed local bootstrap.bundle.min.js to fix 404 console errors -->

    <script>
        // ---------------------------------------------------
        // Wisdom Library books (same as React version)
        // ---------------------------------------------------
        const books = [
            { title: "Psalms for the Preacher", screen: "psalms.html" },
            { title: "Proverbs for the Preacher", screen: "proverbs.html" },
            { title: "Ecclesiastes Perspective", screen: "ecclesiastes.html" }
        ];

        const list = document.getElementById("wl-list");

        books.forEach(b => {
            // Create a formal HTML button element instead of a structural div card block
            const button = document.createElement("button");
            
            // Bootstrap styles to make it a left-aligned, full-width button line structure
            button.className = "btn btn-outline-primary btn-lg w-100 text-start py-3 px-4 shadow-sm";

            button.innerHTML = `
                <span class="wl-card-text fw-bold">${b.title}</span>
            `;

            // Active tracking redirect route trigger listener hook
            button.addEventListener("click", () => {
                window.location.href = b.screen;
            });

            list.appendChild(button);
        });
    </script>
</body>
</html>
