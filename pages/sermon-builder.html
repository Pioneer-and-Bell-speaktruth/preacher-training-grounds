<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sermon Builder</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch('../assets/global.html')
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 sb-container">

        <h1 class="sb-header mb-4">Sermon Builder</h1>

        <button id="new-sermon-btn" class="btn w-100 py-3 sb-button mb-3">
            <span class="sb-button-text">Start New Sermon</span>
        </button>

        <button id="my-sermons-btn" class="btn w-100 py-3 sb-button mb-3">
            <span class="sb-button-text">My Sermons</span>
        </button>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById("new-sermon-btn").addEventListener("click", () => {
            window.location.href = "new-sermon.html";
        });

        document.getElementById("my-sermons-btn").addEventListener("click", () => {
            window.location.href = "my-sermons.html";
        });
    </script>
</body>
</html>
