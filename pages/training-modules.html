<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Modules</title>
    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
        fetch('../assets/global.html')
            .then(r => r.text())
            .then(html => {
                const template = document.createElement("div");
                template.innerHTML = html;
                // Inject CSS + JS into <head>
                document.head.append(...template.querySelectorAll("link, script"));
                // Inject navbar into <body>
                const nav = template.querySelector("nav");
                if (nav) document.body.prepend(nav);
            });
    </script>
</head>
<body class="bg-light">

    <div class="container py-4 tm-container">
        <h1 class="tm-header mb-4">Training Modules</h1>
        
<!-- The 4 Buttons (Left-Aligned Uniform Layout) -->
<div class="container mt-4 mb-5">
    <div class="d-grid gap-3" style="max-width: 500px;">
        
        <a href="https://pioneer-and-bell-speaktruth.github.io/preacher-training-grounds/pages/hermeneutics.html" 
           class="btn btn-lg btn-outline-secondary text-start py-3 px-4 shadow-sm fw-bold">
            Hermeneutics
        </a>

        <a href="https://pioneer-and-bell-speaktruth.github.io/preacher-training-grounds/pages/homiletics.html" 
           class="btn btn-lg btn-outline-secondary text-start py-3 px-4 shadow-sm fw-bold">
            Homiletics
        </a>

        <a href="https://pioneer-and-bell-speaktruth.github.io/preacher-training-grounds/pages/preachers-heart.html" 
           class="btn btn-lg btn-outline-secondary text-start py-3 px-4 shadow-sm fw-bold">
            Preacher's Heart
        </a>

        <a href="https://pioneer-and-bell-speaktruth.github.io/preacher-training-grounds/pages/hebrew-greek-word-study.html" 
           class="btn btn-lg btn-outline-secondary text-start py-3 px-4 shadow-sm fw-bold">
            Hebrew/Greek Word Study
        </a>

    </div>
</div>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
</html>
