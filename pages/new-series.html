<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Series</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch("assets/global.html")
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 newseries-container">

        <h1 class="newseries-header mb-4">Create New Series</h1>

        <input
            id="series-title"
            class="form-control newseries-input mb-3"
            placeholder="Series Title"
        />

        <textarea
            id="series-description"
            class="form-control newseries-input mb-3"
            style="min-height: 100px;"
            placeholder="Series Description"
        ></textarea>

        <button id="save-series-btn" class="btn w-100 py-3 newseries-button">
            <span class="newseries-button-text">Save Series</span>
        </button>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // -----------------------------------------
        // Save new series
        // -----------------------------------------
        document.getElementById("save-series-btn").addEventListener("click", () => {
            const title = document.getElementById("series-title").value.trim();
            const description = document.getElementById("series-description").value.trim();

            if (!title) {
                alert("Please enter a series title.");
                return;
            }

            const newSeries = {
                title,
                description,
                lessons: [],
                created: new Date().toISOString()
            };

            const allSeries = JSON.parse(localStorage.getItem("allSeries")) || [];
            allSeries.push(newSeries);
            localStorage.setItem("allSeries", JSON.stringify(allSeries));

            // Store for next page if needed
            sessionStorage.setItem("currentSeries", JSON.stringify(newSeries));
            sessionStorage.setItem("currentSeriesIndex", allSeries.length - 1);

            window.location.href = "series-planner.html";
        });
    </script>
</body>
</html>
