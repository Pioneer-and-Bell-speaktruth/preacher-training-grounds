<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Bible Word Study</title>
    
    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch('../assets/global.html')
        .then(r => {
            if(!r.ok) throw new Error("Global layout asset not found");
            return r.text();
        })
        .then(html => {
            const template = document.createElement("div");
            template.innerHTML = html;
            
            template.querySelectorAll("link, script").forEach(node => {
                const clone = node.cloneNode(true);
                if (clone.tagName === 'SCRIPT' && clone.src.includes('.css')) return;
                document.head.appendChild(clone);
            });

            const nav = template.querySelector("nav");
            if (nav) document.body.prepend(nav);
        })
        .catch(err => console.warn("Navbar loading bypassed:", err));
    </script>
</head>
<body class="bg-light">
    <div class="container py-4 greek-container">
        <h1 class="greek-header mb-2">Daily Original Word Study</h1>
        <p class="text-muted mb-4">Grow your vocabulary. Refresh the section to draw a completely new biblical term from the lexicons.</p>
        
        <!-- High-Contrast Left-Aligned Buttons Panel Area -->
        <div class="d-flex flex-wrap gap-2 mb-4" style="max-width: 600px;">
            <!-- Swapped to btn-warning for a high-contrast solid background visibility appearance -->
            <button id="random-hebrew-btn" class="btn btn-warning btn-lg text-start text-dark flex-grow-1 py-3 px-4 shadow-sm fw-bold">
                Draw New Hebrew Word (O.T.)
            </button>
            <button id="random-greek-btn" class="btn btn-outline-primary btn-lg text-start flex-grow-1 py-3 px-4 shadow-sm fw-bold">
                Draw New Greek Word (N.T.)
            </button>
        </div>

        <!-- The Unified Display Output Visual Component Card Card -->
        <div id="word-section" class="greek-section" style="max-width: 650px;">
            <h2 class="greek-title mb-3" id="section-title">Word Details</h2>
            <div class="card p-4 shadow-sm text-start">
                <div class="d-flex justify-content-between align-items-start flex-wrap">
                    <div class="text-start">
                        <p class="display-4 fw-bold text-primary mb-1" id="study-word">---</p>
                        <p class="text-muted fs-5 mb-3" id="study-translit"></p>
                    </div>
                    <span id="study-strongs" class="badge bg-secondary fs-4 py-2 px-3">---</span>
                </div>
                <hr>
                
                <p class="greek-text text-start"><strong>KJV Translation Usage:</strong></p>
                <p id="study-kjv" class="lh-base fs-5 ps-3 border-start border-3 border-warning bg-white p-3 rounded mb-3 text-start fw-semibold text-secondary">
                    ---
                </p>

                <p class="greek-text text-start"><strong>Lexicon Definition:</strong></p>
                <p id="study-meaning" class="lh-base fs-5 ps-3 border-start border-3 border-primary bg-white p-3 rounded text-start">
                    Loading daily lexicon data entry...
                </p>
                
                <p class="greek-text mt-3 text-start"><strong>Derivation / Origin Etymology:</strong></p>
                <p id="study-notes" class="text-muted italic ps-3 bg-white p-2 rounded text-start">---</p>
            </div>
        </div>
    </div>
    
      <!-- Explicit dictionary file source references (Loads your global variables directly) -->
    <script src="../assets/js/strongs-hebrew-dictionary.js"></script>
    <script src="../assets/js/strongs-greek-dictionary.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sectionTitle = document.getElementById("section-title");
            const studyStrongs = document.getElementById("study-strongs");
            const studyWord = document.getElementById("study-word");
            const studyTranslit = document.getElementById("study-translit");
            const studyKjv = document.getElementById("study-kjv");
            const studyMeaning = document.getElementById("study-meaning");
            const studyNotes = document.getElementById("study-notes");

            const hebrewBtn = document.getElementById("random-hebrew-btn");
            const greekBtn = document.getElementById("random-greek-btn");

            // -------------------------------------------------------------
            // DYNAMIC RANDOM ELEMENT LOGIC
            // -------------------------------------------------------------
            function getRandomWord(lang) {
                // Read directly from your file's native global variables
                const dict = lang === "greek" 
                    ? window.strongsGreekDictionary 
                    : window.strongsHebrewDictionary;

                if (!dict || Object.keys(dict).length === 0) {
                    alert(`Error: ${lang} dictionary data is empty or missing. Ensure the file names match your assets directory.`);
                    return;
                }

                const keys = Object.keys(dict);
                const randomKey = keys[Math.floor(Math.random() * keys.length)];
                const entry = dict[randomKey];

                if (entry) {
                    renderWordEntry(lang, randomKey, entry);
                }
            }

            function renderWordEntry(lang, fullKey, entry) {
                // Clear out letter prefixes for display formatting
                const numericId = fullKey.replace(/\D/g, "");
                const prefix = lang === "greek" ? "G" : "H";

                if (studyStrongs) studyStrongs.textContent = `${prefix}${numericId}`;
                if (sectionTitle) sectionTitle.textContent = lang === "greek" ? "Greek Daily Word Study" : "Hebrew Daily Word Study";
                
                // 1. Isolate the original lexical script word code
                const rootWord = entry.lemma || "---";
                
                // 2. Extract English Translation Keyword from the definition string
                let englishTranslation = "";
                if (entry.strongs_def) {
                    // Pull the very first words before the first comma/semicolon for a clean summary
                    const cleanWords = entry.strongs_def.split(/[;.,]/)[0];
                    englishTranslation = cleanWords.replace(/[^a-zA-Z\s]/g, "").trim();
                }

                // Append the discovered English keyword directly alongside the original word format layout
                if (studyWord) {
                    if (englishTranslation) {
                        studyWord.innerHTML = `${rootWord} <span class="fs-2 text-muted fw-normal ms-2">(${englishTranslation.toLowerCase()})</span>`;
                    } else {
                        studyWord.textContent = rootWord;
                    }
                }
                
                // 3. Map Transliteration and Pronunciation metrics
                // Hebrew schema uses 'xlit' and 'pron'. Greek schema uses 'translit'.
                const translitData = entry.translit || entry.xlit || "";
                const pronData = entry.pron || "";
                if (studyTranslit) {
                    studyTranslit.textContent = (translitData && pronData) ? `${translitData} (${pronData})` : (translitData || pronData || "");
                }
                
                // 4. Map KJV Translation Usage Space
                if (studyKjv) {
                    studyKjv.textContent = entry.kjv_def || "No specific isolated KJV translations cataloged.";
                }

                // 5. Map Lexicon Definition & Usage
                if (studyMeaning) {
                    studyMeaning.textContent = entry.strongs_def || "No full definition recorded.";
                }
                
                // 6. Map Derivation / Origin Footnotes
                if (studyNotes) {
                    studyNotes.textContent = entry.derivation || "No derivation footnotes recorded.";
                }
            }

            // -----------------------------
            // Live Operational Event Listeners
            // -----------------------------
            if (hebrewBtn) hebrewBtn.addEventListener("click", () => getRandomWord("hebrew"));
            if (greekBtn) greekBtn.addEventListener("click", () => getRandomWord("greek"));

            // AUTOMATIC INITIALIZATION: Delayed launch allows dictionary processing streams to completely stabilize
            setTimeout(() => {
                getRandomWord("greek");
            }, 500);
        });
    </script>
</body>
</html>
