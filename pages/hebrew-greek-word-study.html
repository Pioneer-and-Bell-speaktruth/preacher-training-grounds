<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hebrew & Greek Word Study</title>

    <link rel="stylesheet" href="../assets/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="bg-light">

    <div class="container py-4 greek-container">

        <h1 class="greek-header mb-4">Hebrew & Greek Word Study</h1>

        <!-- Language Selector -->
        <div class="mb-4">
            <label class="form-label fw-bold">Choose Language:</label>
            <select id="language-selector" class="form-select">
                <option value="greek">Greek</option>
                <option value="hebrew">Hebrew</option>
            </select>
        </div>

        <!-- Loading State -->
        <div id="loading" class="greek-loading-container">
            <p class="greek-loading">Loading Word of the Day...</p>
        </div>

        <!-- Word of the Day Section -->
        <div id="word-section" class="greek-section" style="display:none;">
            <h2 class="greek-title">Word of the Day</h2>
            <p class="greek-word" id="study-word"></p>
            <p class="greek-text" id="study-meaning"></p>
            <p class="greek-text" id="study-strongs"></p>
            <p class="greek-text" id="study-notes"></p>
        </div>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // -----------------------------------------
        // Load BOTH Hebrew & Greek Words from localStorage
        // -----------------------------------------
        const greekWord = JSON.parse(localStorage.getItem("greekWordOfTheDay"));
        const hebrewWord = JSON.parse(localStorage.getItem("hebrewWordOfTheDay"));

        const loading = document.getElementById("loading");
        const section = document.getElementById("word-section");
        const selector = document.getElementById("language-selector");

        // Default language
        const savedLanguage = localStorage.getItem("studyLanguage") || "greek";
        selector.value = savedLanguage;

        function loadWord() {
            const lang = selector.value;
            localStorage.setItem("studyLanguage", lang);

            const wordData = lang === "greek" ? greekWord : hebrewWord;

            if (!wordData) {
                loading.style.display = "block";
                section.style.display = "none";
                return;
            }

            loading.style.display = "none";
            section.style.display = "block";

            document.getElementById("study-word").textContent = wordData.word;
            document.getElementById("study-meaning").textContent = "Meaning: " + wordData.meaning;
            document.getElementById("study-strongs").textContent = "Strong’s: " + wordData.strongs;
            document.getElementById("study-notes").textContent = "Notes: " + wordData.notes;
        }

        // Load initial word
        loadWord();

        // Change language
        selector.addEventListener("change", loadWord);
    </script>
</body>
</html>
