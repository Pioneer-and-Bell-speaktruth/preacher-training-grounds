<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hebrew & Greek Word Study</title>
    
    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch('../assets/global.html')
        .then(r => {
            if(!r.ok) throw new Error("Global layout asset not found");
            return r.text();
        })
        .then(html => {
            const template = document.createElement("div");
            template.innerHTML = html;
            
            template.querySelectorAll("link, script").forEach(node => {
                const clone = node.cloneNode(true);
                if (clone.tagName === 'SCRIPT' && clone.src.includes('.css')) return;
                document.head.appendChild(clone);
            });

            const nav = template.querySelector("nav");
            if (nav) document.body.prepend(nav);
        })
        .catch(err => console.warn("Navbar loading bypassed:", err));
    </script>
</head>
<body class="bg-light">
    <div class="container py-4 greek-container">
        <h1 class="greek-header mb-4">Hebrew & Greek Concordance Study</h1>
        
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label fw-bold">Testament / Language:</label>
                <select id="language-selector" class="form-select">
                    <option value="hebrew">Hebrew (Old Testament)</option>
                    <option value="greek" selected>Greek (New Testament)</option>
                </select>
            </div>
            <div class="col-md-8">
                <label class="form-label fw-bold">Search Strong's Number or KJV Translation Word:</label>
                <div class="input-group">
                    <input type="text" id="strongs-input" class="form-select" placeholder="e.g., 3056, G3056, or 'word' / 'perfect'">
                    <button id="search-btn" class="btn btn-primary" type="button">Search Concordance</button>
                </div>
            </div>
        </div>

        <div id="word-section" class="greek-section">
            <h2 class="greek-title mb-3" id="section-title">Word Study</h2>
            <div class="card p-4 shadow-sm text-start">
                <div class="d-flex justify-content-between align-items-start flex-wrap">
                    <div class="text-start">
                        <p class="display-4 fw-bold text-primary mb-1" id="study-word">---</p>
                        <p class="text-muted fs-5 mb-3" id="study-translit"></p>
                    </div>
                    <span id="study-strongs" class="badge bg-secondary fs-4 py-2 px-3">---</span>
                </div>
                <hr>
                
                <!-- KJV Usage Track Definition Section -->
                <p class="greek-text text-start"><strong>KJV Translation Usage:</strong></p>
                <p id="study-kjv" class="lh-base fs-5 ps-3 border-start border-3 border-warning bg-white p-3 rounded mb-3 text-start fw-semibold text-secondary">
                    ---
                </p>

                <p class="greek-text text-start"><strong>Lexicon Definition:</strong></p>
                <p id="study-meaning" class="lh-base fs-5 ps-3 border-start border-3 border-primary bg-white p-3 rounded text-start">
                    Enter a Strong's reference code or type a common KJV English word above to scan the lexicon data.
                </p>
                
                <p class="greek-text mt-3 text-start"><strong>Derivation / Origin Etymology:</strong></p>
                <p id="study-notes" class="text-muted italic ps-3 bg-white p-2 rounded text-start">---</p>
            </div>
        </div>

        <div id="results-selector-container" class="mb-4 card p-3 bg-light border-warning shadow-sm" style="display: none;">
            <label class="form-label fw-bold text-dark"><span class="badge bg-warning text-dark me-2" id="match-count">0</span> Multiple Dictionary Matches Found. Select Entry:</label>
            <select id="results-selector" class="form-select border-warning text-start"></select>
        </div>
    </div>
    
    <!-- Browser Node-Bridge Patch (Fixes the module is not defined error) -->
    <script>
        window.module = { exports: {} };
    </script>

    <!-- Explicit dictionary file source references -->
    <script src="../assets/js/strongs-hebrew-dictionary.js"></script>
    <script>
        window.strongsHebrewDictionary = window.module.exports;
        window.module.exports = {};
    </script>

    <script src="../assets/js/strongs-greek-dictionary.js"></script>
    <script>
        window.strongsGreekDictionary = window.module.exports;
    </script>
    
       <script>
        // Wrap everything inside an event listener to ensure the HTML elements are fully loaded first!
        document.addEventListener("DOMContentLoaded", () => {
            const selector = document.getElementById("language-selector");
            const strongsInput = document.getElementById("strongs-input");
            const searchBtn = document.getElementById("search-btn");
            const resultsContainer = document.getElementById("results-selector-container");
            const resultsSelector = document.getElementById("results-selector");

            const savedLanguage = localStorage.getItem("studyLanguage") || "greek";
            if (selector) selector.value = savedLanguage;

            function getActiveDictionary(lang) {
                if (lang === "greek") {
                    return window.strongsGreekDictionary || window.greekDictionary || null;
                } else {
                    return window.strongsHebrewDictionary || window.hebrewDictionary || null;
                }
            }

            function performSearch() {
                const query = strongsInput.value.trim();
                if (!query) return;

                const lang = selector.value;
                localStorage.setItem("studyLanguage", lang);
                
                const dict = getActiveDictionary(lang);
                if (!dict) {
                    alert(`Error: Dictionary data object for ${lang} is missing or not declared inside its source script.`);
                    return;
                }

                resultsContainer.style.display = "none";
                resultsSelector.innerHTML = "";

                const containsDigits = /\d+/.test(query);

                if (containsDigits) {
                    const digits = query.replace(/\D/g, "");
                    const lookupKey = lang === "greek" ? `G${digits}` : `H${digits}`;
                    
                    const entry = dict[lookupKey] || dict[digits] || dict[parseInt(digits, 10)];
                    
                    if (entry) {
                        // Pass the raw digits cleanly to avoid double prefix padding
                        renderWordEntry(lang, digits, entry);
                    } else {
                        alert(`Strong's number [${lookupKey}] was not found in the database.`);
                    }
                } else {
                    searchByEnglishWord(lang, query, dict);
                }
            }

            function searchByEnglishWord(lang, englishWord, dict) {
                const lowerWord = englishWord.toLowerCase();
                const matches = [];

                for (const key in dict) {
                    if (!dict.hasOwnProperty(key)) continue;
                    const entry = dict[key];
                    if (!entry) continue;

                    const strongsDef = (entry.strongs_def || "").toLowerCase();
                    const kjvDef = (entry.kjv_def || entry.kjv_usage || "").toLowerCase();
                    const definition = (entry.definition || entry.meaning || "").toLowerCase();
                    const lemma = (entry.lemma || entry.word || "").toLowerCase();

                    if (strongsDef.includes(lowerWord) || 
                        kjvDef.includes(lowerWord) || 
                        definition.includes(lowerWord) || 
                        lemma.includes(lowerWord)) {
                        
                        const cleanId = key.replace(/\D/g, "");
                        matches.push({ id: cleanId, key: key, data: entry });
                    }
                }

                if (matches.length === 0) {
                    alert(`No entries matching the word "${englishWord}" were found.`);
                    return;
                }

                if (matches.length === 1) {
                    // FIXED PASSING KEY: Passes matches[0].id (just the digits) to perfectly align with renderWordEntry requirements
                    renderWordEntry(lang, matches[0].id, matches[0].data);
                } else {
                    document.getElementById("match-count").textContent = matches.length;
                    resultsContainer.style.display = "block";
                    
                    resultsSelector.innerHTML = `<option value="">-- Choose From ${matches.length} Entries --</option>`;
                    
                    matches.forEach(match => {
                        const wordLabel = match.data.lemma || match.data.word || "Word";
                        const shortMeaning = match.data.strongs_def || match.data.definition || match.data.meaning || "";
                        const trimMeaning = shortMeaning.length > 50 ? shortMeaning.substring(0, 50) + "..." : shortMeaning;
                        
                        const option = document.createElement("option");
                        option.value = match.key;
                        option.textContent = `[${match.key}] ${wordLabel} - ${trimMeaning}`;
                        resultsSelector.appendChild(option);
                    });

                    clearDisplayFields();
                }
            }

            function renderWordEntry(lang, idStr, entry) {
                const prefix = lang === "greek" ? "G" : "H";
                document.getElementById("study-strongs").textContent = `${prefix}${idStr}`;
                document.getElementById("study-word").textContent = entry.lemma || entry.word || "---";
                
                const translitData = entry.xlit || entry.transliteration || entry.translit || "";
                const pronData = entry.pron || entry.pronunciation || "";
                document.getElementById("study-translit").textContent = 
                    (translitData && pronData) ? `${translitData} (${pronData})` : (translitData || pronData || "");
                
                let kjvString = entry.kjv_def || entry.kjv_usage || "";
                if (kjvString.startsWith(":--")) {
                    kjvString = kjvString.replace(/^:--/, "").trim();
                }
                document.getElementById("study-kjv").textContent = kjvString || "No specific isolated KJV translations cataloged.";

                document.getElementById("study-meaning").textContent = 
                    entry.strongs_def || entry.definition || entry.meaning || entry.description || "No full definition recorded.";
                
                document.getElementById("study-notes").textContent = 
                    entry.derivation || entry.etymology || entry.origin || "No derivation footnotes recorded.";
                
                document.getElementById("section-title").textContent = lang === "greek" ? "Greek Word Study" : "Hebrew Word Study";
            }

            function clearDisplayFields() {
                document.getElementById("study-strongs").textContent = "---";
                document.getElementById("study-word").textContent = "---";
                document.getElementById("study-translit").textContent = "";
                document.getElementById("study-kjv").textContent = "---";
                document.getElementById("study-meaning").textContent = "Select an entry from the dropdown above to display details.";
                document.getElementById("study-notes").textContent = "---";
            }

            // -----------------------------
            // Event Listeners
            // -----------------------------
            if (searchBtn) searchBtn.addEventListener("click", performSearch);
            
            if (strongsInput) {
                strongsInput.addEventListener("keypress", (e) => {
                    if (e.key === "Enter") performSearch();
                });
            }

            if (selector) {
                selector.addEventListener("change", (e) => {
                    localStorage.setItem("studyLanguage", e.target.value);
                    resultsContainer.style.display = "none";
                    clearDisplayFields();
                });
            }

            if (resultsSelector) {
                resultsSelector.addEventListener("change", (e) => {
                    const key = e.target.value;
                    if (!key) return;

                    const lang = selector.value;
                    const dict = getActiveDictionary(lang);
                    if (dict && dict[key]) {
                        const cleanId = key.replace(/\D/g, "");
                        // Drops the alphabetical letter before passing it down so the visual badge builds properly
                        renderWordEntry(lang, cleanId, dict[key]);
                    }
                });
            }
        });
    </script>
</body>
</html>
