<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hebrew & Greek Word Study</title>
    <script>
        // Safely fetches global template layout structures
        fetch('../assets/global.html')
            .then(r => {
                if(!r.ok) throw new Error("Global layout asset not found");
                return r.text();
            })
            .then(html => {
                const template = document.createElement("div");
                template.innerHTML = html;
                
                // FIXED: Separates link styles and script modules cleanly to prevent syntax crashes
                template.querySelectorAll("link, script").forEach(node => {
                    document.head.appendChild(node.cloneNode(true));
                });

                const nav = template.querySelector("nav");
                if (nav) document.body.prepend(nav);
            })
            .catch(err => console.warn("Navbar loading bypassed:", err));
    </script>
</head>
<body class="bg-light">
    <div class="container py-4 greek-container">
        <h1 class="greek-header mb-4">Hebrew & Greek Concordance Study</h1>
        
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label fw-bold">Testament / Language:</label>
                <select id="language-selector" class="form-select">
                    <option value="greek">Greek (New Testament)</option>
                    <option value="hebrew">Hebrew (Old Testament)</option>
                </select>
            </div>
            <div class="col-md-8">
                <label class="form-label fw-bold">Search Strong's Number or KJV Translation Word:</label>
                <div class="input-group">
                    <input type="text" id="strongs-input" class="form-select" placeholder="e.g., 3056, G3056, or 'word' / 'peace'">
                    <button id="search-btn" class="btn btn-primary" type="button">Search Concordance</button>
                </div>
            </div>
        </div>

        <!-- System Processing Status Bar Indicator -->
        <div id="loading-indicator" class="alert alert-info py-2" style="display:none;">
            <div class="spinner-border spinner-border-sm text-info me-2" role="status"></div>
            Downloading stable lexicon database from CDN registry...
        </div>

        <div id="results-selector-container" class="mb-4 card p-3 bg-light border-warning shadow-sm" style="display: none;">
            <label class="form-label fw-bold text-dark"><span class="badge bg-warning text-dark me-2" id="match-count">0</span> Multiple Dictionary Matches Found. Select Entry:</label>
            <select id="results-selector" class="form-select border-warning"></select>
        </div>

        <div id="word-section" class="greek-section">
            <h2 class="greek-title mb-3" id="section-title">Word Study</h2>
            <div class="card p-4 shadow-sm">
                <div class="d-flex justify-content-between align-items-start flex-wrap">
                    <div>
                        <p class="display-4 fw-bold text-primary mb-1" id="study-word">---</p>
                        <p class="text-muted fs-5 mb-3" id="study-translit"></p>
                    </div>
                    <span id="study-strongs" class="badge bg-secondary fs-4 py-2 px-3">---</span>
                </div>
                <hr>
                <p class="greek-text"><strong>Lexicon Definition & KJV Usage:</strong></p>
                <p id="study-meaning" class="lh-base fs-5 ps-3 border-start border-3 border-primary bg-white p-3 rounded shadow-inner">
                    Enter a Strong's reference code or type a common KJV English word above to scan the lexicon data.
                </p>
                <p class="greek-text mt-3"><strong>Derivation / Origin Etymology:</strong></p>
                <p id="study-notes" class="text-muted italic ps-3 bg-white p-2 rounded">---</p>
            </div>
        </div>
    </div>
    
    <!-- Fixed explicit path to Bootstrap script with CDN fallback redundancy -->
    <script src="../assets/dist/css/bootstrap(darkly).min.css" onerror="
        const b = document.createElement('script');
        b.src = 'https://jsdelivr.net';
        document.head.appendChild(b);
    "></script>
    <script>
        const selector = document.getElementById("language-selector");
        const strongsInput = document.getElementById("strongs-input");
        const searchBtn = document.getElementById("search-btn");
        const resultsContainer = document.getElementById("results-selector-container");
        const resultsSelector = document.getElementById("results-selector");
        const loadingIndicator = document.getElementById("loading-indicator");

        const savedLanguage = localStorage.getItem("studyLanguage") || "greek";
        selector.value = savedLanguage;

        let dictionaryCache = { greek: null, hebrew: null };

        /**
         * CDN-Backed Fail-Safe Database Engine
         * Downloads verified, open-source lexicon datasets securely over the network.
         */
        async function fetchAndParseDictionary(lang) {
            if (dictionaryCache[lang]) return dictionaryCache[lang];
            
            loadingIndicator.style.display = "block";
            
            // FIXED: Switched to cloud CDN source paths to bypass local repository 404 errors completely
            const url = lang === "greek" 
                ? "https://githubusercontent.com"
                : "https://githubusercontent.com";
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
                
                const data = await response.json();
                dictionaryCache[lang] = data;
                return data;
            } catch (err) {
                console.error("Concordance Fetch Pipeline Error:", err);
                alert(`Error: Failed to load ${lang} data from cloud repository registry.`);
                return null;
            } finally {
                loadingIndicator.style.display = "none";
            }
        }

        async function performSearch() {
            const query = strongsInput.value.trim();
            if (!query) return;

            const lang = selector.value;
            localStorage.setItem("studyLanguage", lang);
            
            const dict = await fetchAndParseDictionary(lang);
            if (!dict) return;

            resultsContainer.style.display = "none";
            resultsSelector.innerHTML = "";

            const containsDigits = /\d+/.test(query);

            if (containsDigits) {
                const digits = query.replace(/\D/g, "");
                const lookupKey = lang === "greek" ? `G${digits}` : `H${digits}`;
                
                // Matches standard OpenScriptures object lookup conventions
                const entry = dict[lookupKey] || dict[digits] || dict[parseInt(digits, 10)];
                
                if (entry) {
                    renderWordEntry(lang, digits, entry);
                } else {
                    alert(`Strong's number [${lookupKey}] was not found in the database.`);
                }
            } else {
                searchByEnglishWord(lang, query, dict);
            }
        }

        function searchByEnglishWord(lang, englishWord, dict) {
            const lowerWord = englishWord.toLowerCase();
            const matches = [];

            for (const key in dict) {
                if (!dict.hasOwnProperty(key)) continue;
                const entry = dict[key];
                if (!entry) continue;

                const searchableText = Object.values(entry)
                    .filter(val => typeof val === 'string')
                    .join(' ')
                    .toLowerCase();

                if (searchableText.includes(lowerWord)) {
                    const numericKey = key.replace(/\D/g, "");
                    matches.push({ id: numericKey, data: entry });
                }
            }

            if (matches.length === 0) {
                alert(`No lexicon items found matching the KJV word "${englishWord}".`);
                return;
            }

            if (matches.length === 1) {
                renderWordEntry(lang, matches[0].id, matches[0].data);
            } else {
                document.getElementById("match-count").textContent = matches.length;
                resultsContainer.style.display = "block";

                matches.forEach(match => {
                    const option = document.createElement("option");
                    option.value = match.id;
                    
                    const wordText = match.data.lemma || match.data.word || match.data.text || "Unknown";
                    const rawDef = match.data.strongs_def || match.data.definition || match.data.meaning || match.data.kjv_def || "";
                    const shortSnippet = rawDef.substring(0, 70) + "...";
                    
                    const prefix = lang === "greek" ? "G" : "H";
                    option.textContent = `[${prefix}${match.id}] ${wordText} — ${shortSnippet}`;
                    option.dataset.entryPayload = JSON.stringify(match.data);
                    resultsSelector.appendChild(option);
                });

                renderWordEntry(lang, matches[0].id, matches[0].data);
            }
        }

        function renderWordEntry(lang, numberString, entry) {
            const prefix = lang === "greek" ? "G" : "H";
            document.getElementById("section-title").textContent = lang === "greek" ? "Greek Lexicon View" : "Hebrew Lexicon View";
            
            const word = entry.lemma || entry.word || entry.text || "N/A";
            const translit = entry.translit || entry.transliteration || entry.pronunciation || "";
            const definition = entry.strongs_def || entry.definition || entry.meaning || entry.kjv_def || "No text definition mapped.";
            const derivation = entry.derivation || entry.notes || entry.origin || "No derivation properties logged.";

            document.getElementById("study-word").textContent = word;
            document.getElementById("study-translit").textContent = translit ? `Transliteration: [${translit}]` : "";
            document.getElementById("study-strongs").textContent = `${prefix}${numberString}`;
            document.getElementById("study-meaning").textContent = definition;
            document.getElementById("study-notes").textContent = derivation;
        }

        resultsSelector.addEventListener("change", function() {
            const selectedOption = resultsSelector.options[resultsSelector.selectedIndex];
            if (selectedOption && selectedOption.dataset.entryPayload) {
                const entryData = JSON.parse(selectedOption.dataset.entryPayload);
                renderWordEntry(selector.value, selectedOption.value, entryData);
            }
        });

        function handleLanguageReset() {
            resultsContainer.style.display = "none";
            resultsSelector.innerHTML = "";
            const lang = selector.value;
            localStorage.setItem("studyLanguage", lang);
            
            strongsInput.value = lang === "greek" ? "3056" : "7965";
            performSearch();
        }

        selector.addEventListener("change", handleLanguageReset);
        searchBtn.addEventListener("click", performSearch);
        strongsInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") performSearch();
        });

        setTimeout(handleLanguageReset, 200); 
    </script>
</body>
</html>
