<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Series</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch("assets/global.html")
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 edit-series-container">

        <h1 class="edit-series-header mb-4">Edit Series</h1>

        <input
            id="series-title"
            class="form-control edit-series-input mb-3"
            placeholder="Series Title"
        />

        <textarea
            id="series-description"
            class="form-control edit-series-input mb-3"
            style="height: 120px;"
            placeholder="Series Description"
        ></textarea>

        <button id="save-series-btn" class="btn w-100 py-3 edit-series-save-btn">
            <span class="edit-series-button-text">Save Changes</span>
        </button>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/app.js"></script>

    <script>
        // -----------------------------
        // Load navigation state
        // -----------------------------
        const series = JSON.parse(sessionStorage.getItem("currentSeries"));
        const index = JSON.parse(sessionStorage.getItem("currentSeriesIndex"));

        // -----------------------------
        // Populate form
        // -----------------------------
        document.getElementById("series-title").value = series.title;
        document.getElementById("series-description").value = series.description;

        // -----------------------------
        // Save Changes
        // -----------------------------
        document.getElementById("save-series-btn").addEventListener("click", () => {
            const updatedSeries = {
                ...series,
                title: document.getElementById("series-title").value.trim(),
                description: document.getElementById("series-description").value.trim()
            };

            // Update series in storage
            const allSeries = JSON.parse(localStorage.getItem("allSeries")) || [];
            allSeries[index] = updatedSeries;
            localStorage.setItem("allSeries", JSON.stringify(allSeries));

            // Store updated series for next page
            sessionStorage.setItem("currentSeries", JSON.stringify(updatedSeries));

            // Navigate back to series detail
            window.location.href = "series-detail.html";
        });
    </script>
</body>
</html>
