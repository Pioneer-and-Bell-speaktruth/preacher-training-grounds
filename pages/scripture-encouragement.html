<body class="bg-light">

    <div class="container py-4 se-container">

        <h1 class="se-header mb-4">Scripture Encouragement</h1>

        <!-- Vertical grid alignment wrapper stack for left-aligned buttons -->
        <div id="se-list" class="d-grid gap-3" style="max-width: 500px;"></div>

    </div>

    <!-- Removed local bootstrap.bundle.min.js to fix 404 console errors -->

    <script>
        // ---------------------------------------------------
        // Categories
        // ---------------------------------------------------
        const categories = [
            { title: "1 & 2 Timothy", file: "timothy" },
            { title: "Titus", file: "titus" },
            { title: "Psalms", file: "psalms" },
            { title: "Proverbs", file: "proverbs" },
            { title: "Ecclesiastes", file: "ecclesiastes" },
            { title: "Favorites", file: "favorites" }
        ];

        const list = document.getElementById("se-list");

        categories.forEach(cat => {
            // Create a formal HTML button element instead of a structural div card block
            const button = document.createElement("button");
            
            // Bootstrap styles to make it a left-aligned, full-width button line structure
            button.className = "btn btn-outline-primary btn-lg w-100 text-start py-3 px-4 shadow-sm";
            
            button.innerHTML = `
                <span class="se-card-text fw-bold">${cat.title}</span>
            `;

            // Active tracking redirect route trigger listener hook
            button.addEventListener("click", () => {
                sessionStorage.setItem("verseListFile", cat.file);
                sessionStorage.setItem("verseListTitle", cat.title);
                window.location.href = "verse-list.html";
            });

            list.appendChild(button);
        });
    </script>
