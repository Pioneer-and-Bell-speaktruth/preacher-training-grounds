<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Series</title>

    <!-- Load global.html (Bootstrap Darkly + Navbar + Helpers) -->
    <script>
    fetch("assets/global.html")
      .then(r => r.text())
      .then(html => {
          const template = document.createElement("div");
          template.innerHTML = html;

          // Inject CSS + JS into <head>
          document.head.append(...template.querySelectorAll("link, script"));

          // Inject navbar into <body>
          const nav = template.querySelector("nav");
          if (nav) document.body.prepend(nav);
      });
    </script>
</head>

<body class="bg-light">

    <div class="container py-4 ss-container">

        <h1 class="ss-header mb-4">Search Series</h1>

        <input
            id="search-input"
            class="form-control ss-input mb-4"
            placeholder="Search by title or description..."
        />

        <div id="series-list"></div>

        <p id="no-results" class="ss-empty">No series match your search.</p>

    </div>

    <script src="../assets/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ---------------------------------------------------
        // Load series from LocalStorage
        // ---------------------------------------------------
        const allSeries = JSON.parse(localStorage.getItem("allSeries")) || [];

        const list = document.getElementById("series-list");
        const searchInput = document.getElementById("search-input");
        const emptyMsg = document.getElementById("no-results");

        emptyMsg.style.display = "none";

        function renderSeries(filtered) {
            list.innerHTML = "";

            if (filtered.length === 0) {
                emptyMsg.style.display = "block";
                return;
            }

            emptyMsg.style.display = "none";

            filtered.forEach((s, index) => {
                const card = document.createElement("div");
                card.classList.add("ss-card");

                card.innerHTML = `
                    <div class="ss-title">${s.title}</div>
                    <div class="ss-text">${s.description}</div>
                `;

                card.addEventListener("click", () => {
                    sessionStorage.setItem("currentSeries", JSON.stringify(s));
                    sessionStorage.setItem("currentSeriesIndex", index);
                    window.location.href = "series-detail.html";
                });

                list.appendChild(card);
            });
        }

        // Initial render
        renderSeries(allSeries);

        // ---------------------------------------------------
        // Search filtering
        // ---------------------------------------------------
        searchInput.addEventListener("input", () => {
            const q = searchInput.value.toLowerCase();

            const filtered = allSeries.filter(s =>
                (s.title || "").toLowerCase().includes(q) ||
                (s.description || "").toLowerCase().includes(q)
            );

            renderSeries(filtered);
        });
    </script>
</body>
</html>
